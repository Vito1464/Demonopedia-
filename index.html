<!DOCTYPE html>
<html lang="en">
<head>  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Demonopedia — Counterterrorism intelligence tracking and plot analysis dashboard." />
  <title>Demonopedia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Top Navigation -->
    <header id="top-nav">
      <div class="nav-brand">Demonopedia</div>
      <nav class="nav-links">
        <a href="#/network" class="nav-link active" data-view="network">Network</a>
        <a href="#/pipelines" class="nav-link" data-view="pipelines">Pipelines</a>
      </nav>
      <div class="nav-actions">
        <input type="text" class="search-input" placeholder="Search node indices..." id="global-search" />
        <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
        <button class="icon-btn" id="btn-notifications" title="Notifications">🔔</button>
        <div class="avatar-circle" id="user-avatar"></div>
      </div>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-icon">✦</div>
        <div>
          <div class="sidebar-title">Global Nodes</div>
          <div class="sidebar-sub">Demonic Infrastructure</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Populated dynamically -->
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-btn primary" id="btn-refresh-map">Refresh Map</button>
        <button class="sidebar-btn" id="btn-add-node" style="color: #111; font-weight: 700; background: #e0e0e0; border-color: #999;">+ Add Node</button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main id="main-content">
      <!-- Views rendered here dynamically -->
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
